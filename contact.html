<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BomaLink - Contact Us</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="landing-page">
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="bomalink-logo.png" alt="BomaLink logo" class="logo-img"></a>
            <div class="nav-links">
                <a href="index.html#features">Features</a>
                <a href="resident.html" class="nav-btn">Resident Login</a>
                <a href="guard.html" class="nav-btn">Security Portal</a>
            </div>
        </div>
    </nav>

    <main class="container contact-page">
        <header class="section-header">
            <h1>Get in Touch</h1>
            <p>Have questions or need assistance? Fill out the form below and we'll respond shortly.</p>
        </header>

        <section class="card contact-form-section">
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" placeholder="How can we help you?" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
        </section>

        <footer class="footer">
            <p>&copy; 2026 BomaLink. All rights reserved.</p>
        </footer>
    </main>
</body>
</html>
